name: Dependency Review

on:
  pull_request:

permissions:
  contents: read
  pull-requests: write

jobs:
  dependency-review:
    name: Review new dependencies
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/dependency-review-action@v4
        with:
          # Fail on any newly introduced package with a known CVE.
          # Comment on the PR with a summary of flagged packages.
          fail-on-severity: moderate
          comment-summary-in-pr: always
