name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build:
    name: Build & audit
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Audit dependencies
        # --audit-level=moderate fails the job on moderate+ severity CVEs.
        # Use --audit-level=high if moderate is too noisy while the project is young.
        run: npm audit --audit-level=moderate
